<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
			rel="stylesheet"
		/>
		<title>Security Associates, Inc.</title>
		<link rel="stylesheet" href="style.css" />
	</head>

	<body class="services-page-body">
		<div id="header"></div>

		<main class="page-content">
			<section class="services">
			
<div class="consulting-services">
				
						<h1>Consulting Services</h1>

						<div id="serviceModal" class="service-modal">
		<div class="service-modal-content">
			<h2 id="serviceModalTitle"></h2>
			<p id="serviceModalText"></p>
		</div>
	</div>

						<div class="service-card-grid">
							<button class="service-card" data-service="legal">
								<img
									src="photos/services/LegConsult.png"
									alt="Legal Consulting icon"
								/>
								<h3>Legal Consulting<br />&amp;<br />Expert Witness Service</h3>
							</button>

							<button class="service-card" data-service="risk">
								<img
									src="photos/services/EvalSecurity.png"
									alt="Risk Analysis icon"
								/>
								<h3>Evaluation<br />&amp;<br />Security Risk Analysis</h3>
							</button>

							<button class="service-card" data-service="surveys">
								<img src="photos/services/SSA.png" alt="Surveys icon" />
								<h3>Surveys<br />&amp;<br />Standard-of-Care Assessments</h3>
							</button>

							<button class="service-card" data-service="program">
								<img
									src="photos/services/ProgramAnalysis.png"
									alt="Defensibility icon"
								/>
								<h3>Program Analysis<br />&amp;<br />Defensibility</h3>
							</button>
						</div>
					</div>
				</div>
			</div>

			</section>
		</main>

		<div id="footer"></div>

		<script src="script.js"></script>
	</body>
</html>
